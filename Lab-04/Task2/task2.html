<!DOCTYPE html>
<html>
<head>
    <title>Animated Image Gallery</title>
    <link rel="stylesheet" href="task2.css">
</head>
<body>

<div class="gallery-container">
    <h2>Animated Image Gallery</h2>

    <img id="galleryImage" src="img1.jpg" alt="Image">
    <p id="caption">Beautiful Nature</p>

    <div class="buttons">
        <button id="prev">Previous</button>
        <button id="next">Next</button>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script>
$(document).ready(function(){

    let images = [
        {src:"img.png", caption: "Nature"},
        {src:"img2.png",caption:"Sunset View"},
        {src:"img3.jpg", caption:"Mountain Scene"}
        
    ];

    let index = 0;

    function showImage(){
        $("#galleryImage").fadeOut(300, function(){
            $(this)
            .attr("src", images[index].src)
            .fadeIn(300);
        });

        $("#caption").text(images[index].caption);
    }

    $("#next").click(function(){
        index = (index + 1) % images.length;
        showImage();
    });

    $("#prev").click(function(){
        index = (index - 1 + images.length) % images.length;
        showImage();
    });

});
</script>

</body>
</html>
